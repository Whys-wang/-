<!DOCTYPE html>
<html lang="zh">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Go语音输入法</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{

            height:100vh;

            display:flex;

            justify-content:center;

            align-items:center;

            background:linear-gradient(
                    135deg,
                    #667eea,
                    #764ba2
            );

            font-family:Arial;
        }

        .container{

            width:700px;

            background:white;

            border-radius:20px;

            padding:40px;

            box-shadow:0 10px 30px rgba(0,0,0,0.2);

            text-align:center;
        }

        h1{

            margin-bottom:30px;

            color:#333;

            font-size:42px;
        }

        textarea{

            width:100%;

            height:250px;

            border:none;

            resize:none;

            outline:none;

            padding:20px;

            font-size:22px;

            border-radius:15px;

            background:#f5f5f5;

            box-shadow:inset 0 0 10px rgba(0,0,0,0.05);
        }

        .buttons{

            margin-top:25px;

            display:flex;

            justify-content:center;

            gap:20px;
        }

        button{

            border:none;

            padding:15px 35px;

            border-radius:12px;

            font-size:20px;

            color:white;

            cursor:pointer;

            transition:0.3s;
        }

        #startBtn{

            background:#28a745;
        }

        #startBtn:hover{

            background:#1f8a38;
        }

        #stopBtn{

            background:#dc3545;
        }

        #stopBtn:hover{

            background:#b52a37;
        }

        #status{

            margin-top:25px;

            font-size:24px;

            color:#555;
        }

        .active{

            color:#28a745;

            font-weight:bold;
        }

        .stop{

            color:#dc3545;

            font-weight:bold;
        }

    </style>
</head>

<body>

<div class="container">

    <h1>🎤 语音输入法</h1>

    <textarea
            id="text"
            placeholder="语音识别内容会显示在这里..."
    ></textarea>

    <div class="buttons">

        <button id="startBtn"
                onclick="toggleRecognition()">

            🎙 开始说话
        </button>
    </div>

    <div id="status">

        状态：
        <span class="stop">
                未开始
            </span>

    </div>

</div>

<script>

    const SpeechRecognition =
        window.SpeechRecognition ||
        window.webkitSpeechRecognition;

    if (!SpeechRecognition) {

        alert("当前浏览器不支持语音识别");
    }

    const recognition = new SpeechRecognition();

    recognition.lang = "zh-CN";

    recognition.continuous = false;

    recognition.interimResults = false;

    const textarea =
        document.getElementById("text");

    const status =
        document.getElementById("status");

    const button =
        document.getElementById("startBtn");

    let isRecording = false;

    let hasResult = false;

    function toggleRecognition(){

        if(!isRecording){

            hasResult = false;

            recognition.start();

            isRecording = true;

            button.innerHTML =
                "■ 停止说话";

            button.style.background =
                "#dc3545";

            status.innerHTML =
                '状态：<span class="active">正在录音...</span>';

        }else{

            recognition.stop();

            isRecording = false;

            button.innerHTML =
                "🎤 开始说话";

            button.style.background =
                "#28a745";

            status.innerHTML =
                '状态：<span class="stop">正在识别...</span>';
        }
    }

    recognition.onresult = function(event){

        hasResult = true;

        textarea.value +=
            event.results[0][0].transcript;

        status.innerHTML =
            '状态：<span class="active">识别成功</span>';
    };

    recognition.onerror = function(event){

        console.log(event.error);

        status.innerHTML =
            '状态：<span class="stop">识别失败</span>';

        isRecording = false;

        button.innerHTML =
            "🎤 开始说话";

        button.style.background =
            "#28a745";
    };

    recognition.onend = function(){

        if(!hasResult){

            status.innerHTML =
                '状态：<span class="stop">识别失败</span>';
        }

        isRecording = false;

        button.innerHTML =
            "🎤 开始说话";

        button.style.background =
            "#28a745";
    };

</script>

</body>
</html>
